body:
  text: 敘醫國者嘗以小人女子為難養而醫人者亦惟女子與小人為難醫蓋婦孺有病恆不能自道其所苦即言之而有所不能盡醫者所持以診察之術曰望聞問切者四端之中其一已完全失效故曰難也知其難而更端以明之曲折以驗之則無難而非易也衡廬主人逐風塵二十年涉津梁數千里亦嘗為國宣力於行政司法各界有所服務小試其醫國之手術為斯民一療疾苦而無如際時之艱值運之屯牛刀之利卒不能久奏於割雞於是息影衡門究心醫門嘗就所心得成婦科幼科指南兩編蓋從其難者入手則易者自迎刃而解天下事事皆然不獨醫之為術然也是編出而兒科婦科若昏夜中得列炬矣憶二十年前衡廬主人年少氣盛慷慨論當世事輒攘臂嗔目視措天下於磐石出斯民於水火若反掌間事光陰荏苒人事變遷曾幾何時竟入此閉門究愁埋首著書之境不可概夫民國十四年歲次乙丑孟夏月蔬香居士序四診總括兒科自古再為難事蓋以小兒形質柔脆易虛易實調治少乖則毫釐之差遂至千里之愆而氣血尚未充盈難只以據脈為準神識未發不知言其疾苦也診小兒之病惟憑面色識其因何而病再向虎口風氣命三關當視脈紋形色診其屬熱屬寒聽其所主之因審其安煩苦欲飲食二便之病兼切其脈之浮沉遲數滑澀大小有力無力則表裡虛實寒熱隨證可參矣察色欲識小兒百病之原先從面上五部五色詳細觀之蓋額屬心頦屬腎鼻屬脾右腮屬肺左腮屬肝青為肝色赤為心色黃為脾色白為肺色黑為腎顏如面青主驚風赤主大熱面黃主傷脾傷食白主虛寒黑色主痛多是惡候總之五色明顯為新病其證輕濁晦為久病其證須作重看又部色相生者如脾病色黃此正色也若見紅色乃火能生土故為順病易治若部色相剋如脾病而見青色乃木來剋土病多難治余病仿此又部色相生若氣血充實者縱有外邪助病易治又部色相剋若久病氣血虛者則正氣不支再難堪治如天庭青暗驚風必至紅主內熱黑則難痊太陽青主驚風青色入耳死印堂青色主驚瀉纏繞風池在眉下氣池在眼下若二處青主驚風紫多吐逆兩眉青主吉紅色主多煩熱鼻赤主脾熱鼻黑則死唇赤主脾熱白主脾寒左腮赤色肝經有熱右腮發赤主肺熱痰盛承漿青主驚黃主嘔吐黑主抽搐其病纏綿此是察色之大要還將脈證一同參之聽聲診小兒之法必聽五聲五聲相應乎五臟之情蓋心屬火病則聲急多言喜笑肺屬金病則聲悲音濁不清肝屬木病則聲呼多狂叫脾屬土病則聲歌其音顫輕腎屬水病則聲呻吟而長且細此五聲昭著其證分明矣如有聲無淚聲短而啼啼而不哭則氣不伸暢知主腹痛如有聲有淚聲長曰哭哭而不啼則氣急心煩將作驚也咨煎不安乃心經內熱故煩躁不寧嘎聲聲濁此為外感風寒也有餘之證其氣實故聲雄大而多壯厲不足之證其氣虛故聲短怯弱而輕多言與體熱皆陽也陽主腑證懶語與身涼皆陰也陰主臟形狂言焦躁者邪熱盛也譫語神昏者熱乘於心其病凶也如鴨之聲在喉而啞氣將絶也直聲而無回轉而急又無眼淚命將頃也凡小兒之虛實寒熱皆從聲音而別聞而知之無遁情矣審病審問小兒之病貴乎詳細考察要在起居安煩苦欲之間先問飲食能食不食渴與不渴次問二便或調和或通或祕或干發熱無汗此邪在表也內熱便鞕作邪在裡看之若晝煩熱而夜安靜是陽旺於陽分其病在陽若晝安靜而夜煩熱是陽陷陰分其病在陰須當詳別如喜暖惡寒皆屬陰病故為寒惡暖喜寒皆屬陽病故為熱也能食者胃壯不食者胃弱也口不渴者胃濕盛也渴者胃燥干也至於大便稠黏穢氣難聞者為內有滯熱從熱化若尿清不赤乃寒從寒化也若耳稍及尻骨四肢皆發冷者知是痘疹欲發之候如單指稍發冷者主驚癇之病肚腹熱悶者乃內熱也四肢厥冷是中寒也小兒無故眉皺曲腰啼叫者內因腹作痛也如兩耳之熱常常不已乃風熱外纏也然腹痛須按其或軟與硬若不喜按為虛喜按為實參此情形方可故欲醫赤子須誠心辨問則對證施方治不難矣切脈小兒周歲有疾亦當切脈但部位甚少不能以三指診之只用一指以定寸關尺三關浮脈輕取之皮膚之上而得沉脈重按筋骨之間而見如一息六至為平和之脈則無病過則七八至為數減則四五至為遲脈滑脈如珠走盤往來多流利澀脈帶澀往來艱難如浮中沉三部無力為虛脈三部有力作實脈言之中部取之無力為芤脈若微脈按之在微細或有或無之間洪脈者來時雖盛去時無力緩而時止為結脈數而時止為促脈緊脈左右如轉索之狀弦脈則端直如張弓弦以上皆言脈之形象至數也但浮脈在表外感風寒之病沉為在裡內傷飲食之端數脈病在六腑屬陽熱之證遲脈病在五臟乃陰寒證也滑主痰盛洪主火熱微主怯弱弦主痰飲結主積聚促主驚癇芤主失血澀主少血沉緊主腹痛浮緊主感寒虛主諸虛不足之病實主諸實有餘痘疹欲發脈主洪緊大小不勻之脈中惡來因一息三至是虛度足極又九至十至乃火熱炎甚以上諸脈所主之病也若一息一至二至或十一十二至皆死脈也浮散無根及沉伏取之不應指者皆難治之脈也病之表裡陰陽虛實可以診之當合望聞問三者細為參考焉虎口三關脈紋形色初生小兒當視虎口叉手處男從左手次指內側女從右手次指內側看之次指三節分為風氣命三關若脈紋形色紅黃相兼隱隱不見則為平安無病形見色變知有病矣若紫屬內熱紅屬傷寒黃為脾病黑主中惡青主驚風白是疳證紋在風關主病輕氣關主病重至命關若見病多難治又當視其紋形大小曲彎如曲而紫者主傷食內熱曲色青主人驚及走獸驚起端赤色者主水火飛禽驚撲黃色主雷驚黑色主陰癇圓長者名曰長珠形主傷飲食如紋形一點紅色名曰流珠紋主內熱上尖長下微大者名曰去蛇形主傷食吐瀉上大下尖長者名曰來蛇形主濕熱成疳形彎如弓返向里者主感冒寒邪形彎如弓迫向大指外者主內有痰熱盛其紋左斜中指者主傷風右斜大指者主感寒紋直若懸針微短又直射如槍形微長皆主痰熱其紋直射指甲之端主脾氣大敗命難保全如紋見乙字形主驚風抽搐二曲如鉤形主傷生冷若三曲如蟲主傷硬物似水之紋主咳嗽若聯絡如環主吐瀉成疳若如魚骨形主驚熱如曲蟲形主積滯又形如亂蟲者主有蛔蟲纏擾當以脈紋形色相參合察得免行醫害命之端初生門拭口下毒嬰兒初生拭口之法須用軟綿裹指拭淨口中不潔繼以胭脂蘸茶清擦口舌齒頰之間令其潔淨日後方無口病所生將水濃煎甘草湯以棉裹指蘸汁頻兒吮服免使胎毒蘊於腹中再有一法用黃連濃煎汁出滴口內毒隨臍糞而下自清如清熱防驚用硃砂大豆許研細水飛蜜調乳汁化服之法惟稟賦怯弱者不宜行也怯弱之兒解毒法者用豆豉濃煎汁汁當乳嘗之斷臍嬰兒初生用剪向火烙熱剪下臍帶次用火器繞臍帶烙之男女六寸為止始相合宜短則傷臟長則損肌斷訖又用烙臍餅子安灸臍上以防風邪外入隨用胡粉散敷臍帶間用軟絹新綿封裹以避尿濕也浴兒三日浴兒之法為其解汙穢也須用五枝煎湯須擇無風密室冬夏寒溫適可而止如久在水中冬月恐當受寒夏日恐當受熱再加豬膽汁以去汙穢且能滋潤肌膚免生胎瘡也剃頭小兒滿月必剃胎頭須向密室溫和之處適可求之恐血未充寒風易入後用杏仁麻油蘇荷膩粉拌勻揉頭上凡胎毒瘡癤一切皆休不啼小兒落地啼聲即發形生命立矣有不能啼者俗語名之為草迷是也多因臨産難於生育以致氣閉不通或值隆冬之際兒氣為寒所逼亦不能啼因於難産者用蔥輕輕以擊其背通氣以醒神則可回生因寒逼者切勿剪斷臍帶急用紙捻蘸油點火往來熏其臍帶使暖氣入腹即啼若氣絶無聲面青爪甲已黑形雖存命已在須臾之間矣不乳小兒生下能吮乳本自天然若不吮必有緣故或因腹中穢惡未下清淨令小兒腹滿氣短嘔吐不乳或在胎中因母過食寒涼胎受其氣兒必腹痛多啼素稟而寒如穢惡不淨用一捻金治之效胎寒不乳以勻氣散為先若更面青四肢厥冷此是虛寒用理中湯煎服眼不開小兒初生眼閉不能開者因孕婦飲食不節恣情厚味熱毒熏蒸以致兒脾蘊熱眼胞屬脾其脈絡緊束故也此皆受於胎里也內用地黃湯服之再妙外用熊膽湯洗目其效靈哉吐不止小兒吐不止者因何而生有因便閉穢惡不淨停留胃內令兒腹滿而成其吐或緣稟受胎中寒熱而來或因生時感冒而成如穢惡不淨而吐用一捻金散下之若外感寒邪入里犯胃則曲腰而啼吐沫不止用香蘇飲溫散之能愈又有胎前受熱面黃赤手足溫口吐黃涎酸黏者用黃連合二陳湯治之若受寒面青白四肢冷口吐清沫用理中湯主之不小便小兒初生小便不通者乃胎熱壅於下也用導赤散熱盛者八正散二方攻之外用豆豉膏貼臍上須臾小便自能通矣不大便小兒初生或次日即大便名下臍屎此腸胃通和幽門澤潤也若二三日大便不通名曰鎖肚皆緣辛熱之毒受於胎中兒必面赤腹脹不乳多啼宜用朱蜜法治之若不應用一捻金酌量與之繼令婦人以溫水漱口急咂二手心及臍下又二足心前後背心共七處以皮見紅色為度大便自通矣大小便不通小兒初生二便俱祕者最為急候乃胎中熱毒極甚而成也急用木通散與紫霜丸行其滯開其結真妙之方急用口咂之法悉如前式庶可望生若延至七日謂之一䏠肚腹硬脹常作呻吟難治肛門內合小兒初生肛門內合有二有因熱毒大甚肛門內結或是脂膜遮瞞無隙可通如熱毒壅結者服黑白散外用蘇合香丸作棗核狀納入孔中取其香能開竅又能潤澤大便導下庶可望生如脂膜遮瞞先以金玉簪刺通脂膜再以蘇合香丸照前導法可回生矣噤口小兒噤口之證失治多致不救其候舌上生瘡如黍米狀吮乳不得啼聲漸難因胎熱所致法當清熱疏利用龍膽湯主之極妙若肚腹脹硬二便閉用紫霜丸又有一種口吐白涎牙關緊急者此胎熱內結復有風邪外入當以擦牙散先擦其牙關上次用辰砂全蠍散煎服至病勢稍安即止勿可過帖病退調和脾胃以勻氣散為先也撮口撮口者口撮如囊口吮乳艱難舌強唇青口吐沫痰面色赤黃乃受自胎中熱極而然如四肢厥冷其病難全如氣高痰盛宜用辰砂殭蠶散二便閉者須用紫霜丸主之身熱多驚者用龍膽湯極妙手足抽搐者撮風散自妥臍濕臍瘡浴兒任意洗濯或包裹不周以致尿濕侵臍遂致肚臍淋漓不幹名曰臍濕甚則焮赤作成瘡痍名曰臍瘡如臍濕必用滲臍散敷之如臍瘡用金黃散敷之最宜臍突嬰兒蘊熱在於腹中無所發泄故伸引頻頻睡臥不寧努張其氣衝入臍本所以臍忽腫赤虛大光浮乃臍突之名內服犀角消毒飲外敷二豆散以消腫極靈最忌寒涼之藥敷於臍上恐冰凝毒熱反成凶也臍風臍者小兒之根蒂也名曰神關穴近三陰喜溫惡涼喜干惡濕如斷臍悉遵前法臍風何由而起惟不知慎重以致風寒水濕入於臍中兒必腹脹臍腫日夜啼叫臍風之病成矣若將作用驅風散治之最效若寒邪深入已成臍風者則其所兼之形證再要分別明視如肚腹脹硬大便祕塞風兼實也用黑白散主之面白四肢寒冷二便不實者風兼虛也用理中湯主之痰涎壅盛氣高喘急者風痰也殭蠶散主之身體壯熱面赤口乾者風兼熱也龍膽湯清之若面青嘔吐曲腰多啼者風兼寒也益脾散治之唇青撮口抽搐不止者風兼驚也用撮風散平之若臍邊青黑口噤不開者是為內抽為不治如一臘逢之者即七日命必傾也蓋血脈未凝病已中臟治之無益天釣小兒天釣之證由邪熱積於身胸以致痰涎壅塞氣不宣通而成此證發時手足瘛瘲壯熱有時驚悸頭目仰視爪甲皆青但證似驚風此病目多仰視較驚風稍異如痰盛搐掣者用九龍控涎丹治之如驚盛兼風牛黃散最靈瘛瘲多熱者宜鉤藤飲減去人參用之如爪甲皆青用蘇合香丸為精內釣內釣者多因肝臟素病外受寒冷其候糞青潮搐作止有時狀似驚癇傴僂腹痛口吐涎沫證與驚癇相類但有紅絲血點目中纏擾如瘛瘲甚者用鉤藤飲主之急啼腹痛者用木香丸主之若四肢冷甲青唇口黑者用養臟散溫中或可保全也盤腸氣痛盤腸氣痛乃寒邪搏結腸中而痛肝腎居下故痛則曲腰不乳蹙結雙眉內則定痛溫中用白豆蔻散主之又尉臍外治之法亦堪垂於世目爛兒生兩目有病痛癢難睜胞邊赤爛因胎中蘊熱生後毒熱上攻於目故有是證內用地黃湯以清其熱外點真金散其目即明懸癰凡喉里上齶腫起如蘆籜盛水狀者號曰懸癰皆因胎中毒熱上衝須以棉纏長針留鋒刺破瀉去青黃赤汁以鹽湯拭口或如聖散或一字散摻之靈驗重齦重齦者因小兒在胎有熱胃中蓄臟故牙根腫脹如水泡其痛難禁治法用針刺破以鹽湯拭淨外用一字散敷上內服清胃散其效如神鵝口鵝口者白屑生滿口舌如鵝之口也乃心脾二經熱蘊於中本由胎里受母飲食熱毒之原故生後即發於口舌之間治清熱瀉脾散外用發蘸井水拭口搽以保生散治之稍遲則口舌糜爛治難痊也吐舌如舌伸長而收緩者名為吐舌皆是心經有熱而成故面紅煩躁口渴便溺赤澀宜瀉心導赤湯服之即靈弄舌弄舌者舌時時口內搖動也因心脾熱發口唇焦乾煩熱舌乾大便臭穢先用瀉黃散次則用瀉心導赤散並能痊愈也重舌舌下近舌根處腫突似舌形故名重舌心脾積熱上而攻衝所致內服宜以清熱飲為主外敷涼心散其功最靈木舌木舌之證皆因心脾積熱而成蓋脾之脈絡在舌下又舌為心苗遇火上衝令兒舌腫脹木硬不能轉動其證多凶外用川消散敷在舌上內服瀉心導赤湯最靈驗也哯乳小兒哯乳之證非止一端有宿乳有停痰有胃熱有胃寒之分如面色多赤二便微閉手足指熱此為熱哯也宜和中清熱飲主之面色青白糞青多沫手足指冷此因寒而哯也用溫中止吐湯煎服如口燥唇乾夜臥不寧手足心熱此為傷乳而哯也宜平胃散最妙如胸膈脹滿嘔吐停痰此因停痰而哯也宜枳桔二陳湯可痊若是吃乳過多滿而自溢者不必服藥常須節乳自能安也夜啼小兒初生夜啼其因有二一曰脾寒一曰心熱皆因胎中所受當觀其形色便分明矣如寒屬脾經則面色青白手足俱冷曲腰不伸而疼也如面赤唇紅身腹內俱熱溺閉不利煩躁多啼者乃屬心熱也如熱用導赤散寒用鉤藤飲若無寒熱表裡之證但多啼者依古法用蟬花散最精胎黃兒生遍體面目皆黃其色如金黃乃孕婦濕熱熏蒸小兒在胎受母熱毒深極而生法當滲濕而兼清熱須分輕重治之色微黃者用生地黃湯深黃者犀角散二方如神胎赤胎赤者因孕婦過食辛熱之物以致毒熱凝結蘊於胞中兒受毒深遂令生下頭面遍體赤若丹塗當以清熱解毒湯極妙如熱盛便祕者蔣氏化毒丹功效最殊赤遊風小兒赤遊風證多因胎中毒熱而成或生後過於溫暖毒熱蒸發於外以致皮膚赤熱而腫色若丹塗遊走不定遍身而行若發在頭面四肢之間猶可治若內歸心腹則命難生矣當內服犀角解毒飲如若不愈繼以藍葉散外再用砭法刺出毒血則痊毒盛者再敷以神功散毒輕者不用敷藥在百日之內者小兒忌砭血以其肌肉難任也須用豬肉貼法或以赤小豆末及雞子清調塗之二法皆可安寧也初生無皮小兒生下無皮其證有二端焉或因父母素有楊梅結毒遺染而傳或上半身赤爛或下半身赤爛甚至無皮而色帶紫黑或因未足月而生遍體浸漬紅嫩而光其痛難堪二者均屬惡候如楊梅結毒者內服換肌消毒飲外敷清涼膏或鵝黃粉則痊如胎元不足者內服當歸飲外用稻米粉撲之其皮自漸漸生完而堅實矣變蒸天地化生萬物必以春溫夏熱而長兒之初生亦同此理變生形神自生之日至三十二日為一變至六十四日曰一蒸變則長其百骸生其臟腑蒸則增其智慧發其聰明十變五蒸之外又有三六十八大蒸合計七十六日也變蒸既異形神已成此後則不復變蒸矣然每變蒸之狀乃陰陽氤氳蒸之氣而然故身微熱耳尻骨屬陰以陽不傷陰而與陰和之象故冷而不熱蓋陰陽和變化生形神故無他病情也驚風門總括心藏神心病主驚肝屬木肝病故主風也凡小兒心熱肝盛一觸驚受風則風火相搏必作急驚之證若素稟既虛或因急驚用藥過峻暴傷元氣每變成慢驚之症更有因吐瀉既久中氣大虛脾土衰弱肝木乘虛而內生驚風者名曰慢脾風三者致病之因不同而所見之證亦各異急驚屬陽證必有陽熱有餘等實象慢脾屬陰證必有陰冷不足虛形也至於慢驚初得之時陰陽尚未過損或因急驚傳變而成其中尚有夾痰夾熱等證故屬半陰半陽之證不比慢脾純陰之病也治者當分寒熱虛實要詳明也驚風八侯驚風八候者乃搐搦掣顫反引竄視之名是也如肘臂伸縮名之為搐十指開合搦狀已成勢若肩頭相撲謂之掣顫則頭首四肢動搖如鈴反則身仰頭向後引者兩手若開弓竄候則目直常似怒形視則睹物不轉睛露其搐以男子左手女右手女大指在內男大指在外為順反是為逆須識急驚慢驚之證所見皆同此候虛實無所異焉通關急救法驚風搐搦必神氣昏憒皆由痰壅氣塞在胸中所致急用通關散吹入鼻內無嚏則死有嚏者則生也審其表裡虛實治之急驚風急驚一證因目觸異物耳聞異聲心驚有熱神散氣亂而生者或由心肝火盛外為風寒鬱閉不得宣通而火生風者有因痰盛熱極而內動風者然證多暴發壯熱煩急面赤唇紅痰壅氣促牙關噤急不開二便祕澀脈數而洪皆主陽熱也觸異致驚者用清熱鎮驚湯安神鎮驚丸主之火鬱生風者至寶丹主之痰盛生驚者牛黃丸攻下之熱極生風者涼膈散清解之病不甚者則用平治之法風熱者羌活散主之肝熱者瀉青丸主之痰兼熱者清熱化痰湯主之心經熱者導赤散共涼驚丸主之急驚後調理法急驚多用寒涼亦急則治標之法但痰火稍退即當調理脾胃若過用寒涼必致轉成慢驚等證故驚邪一退之後尚有痰熱未清當用琥珀抱龍丸最靈若神氣虛弱痰兼熱者用清心滌痰湯大有功效也慢驚風慢驚一證多緣稟賦虛弱土虛木盛者有之或因急驚過用峻利之藥以致損而成此證者有之發時緩緩搐搦時作時止面色淡黃或清白相兼身則溫和昏睡眼合睛則或露脈來遲緩神氣慘慘大便青色此乃脾胃虛弱治宜培補元氣為主氣虛夾痰者用醒脾湯最效脾虛肝旺者用緩肝理脾湯最靈慢驚夾熱夾痰慢驚之證本無熱可言但脾虛虛熱內生熱生痰故有夾熱或夾痰其證身熱心煩口溢痰涎咽喉氣粗如痰熱相兼者宜用清心滌痰湯治之如脾虛肝旺痰盛者用青州白丸子柴芍六君子湯煎服慢脾風慢脾一證多因吐瀉既久以致脾虛不能生金金必弱不能制木肝木強盛以克脾土故曰脾風其症搖頭閉目面唇青暗額汗昏眼四肢身體如冰聲啞舌短頻嘔清水也此乃純陰無陽之證惟宜大補脾土為真生胃回陽為主如吐瀉亡陽者溫中補脾湯為主治大病後成者固真湯四肢厥冷者理中湯從用癇證門總括小兒癇證類乎痙風驚風者謂發時昏倒抽搐痰涎壅盛氣促作聲與痙驚二證相似但四肢柔軟一食之頃即醒依然如無病之狀非若痙風一身強硬終日不醒也有陰癇見臟陰證有陽癇見腑陽證有驚癇因驚熱痰癇因痰食癇因食風癇因風其證不一治亦不同宜詳辨之陰癇陰癇屬陰藏寒之病也多因慢驚風之後疾入心包而得發時四肢厥冷偃臥拘急面色白青口吐涎沫聲音微少脈來沉細輕者醒脾湯甚者固真湯病退調理用定癇丹最靈陽癇陽癇屬陽腑熱之病也多因急驚去風下痰不淨久而致成此症發時身熱自汗仰臥面赤脈象數洪牙關噤急啼叫不已口吐涎沫如風兼熱者用龍膽湯肝經熱者用瀉青丸痰涎壅盛者與四制抱龍丸主之驚癇小兒驚癇之證乃心肝熱盛偶被驚邪所觸因而神氣潰亂遂成癇證發時吐舌急叫面色乍白乍紅悚惕不安如人將捕之狀宜安神為主先服大青膏次服鎮驚丸其效再靈痰癇痰癇者因小兒平素自己多痰或偶因驚熱遂致成癇發時痰涎壅盛在喉間氣促昏倒口吐痰沫宜先服一捻金以急下其痰次與朱衣滾痰丸則氣順痰清而癇自止矣食癇食癇者其病在脾因小兒乳食過度停積中脘乘一時痰熱壅盛乃使之而然面黃腹滿吐利酸臭後變時時發搐宜用妙聖丹主之痰盛者朱衣滾痰丸主之後用清熱和胃丸則積滯清而驚癇安矣風癇風癇因汗出脫衣腠理開張其風乘隙而入經中發時二目青黯面色淡紅十指屈伸如數物狀治法宜先疏風解表輕則化風丹主之重則羌活桂枝湯主之風兼痰者牛黃丸則寧也疳證門總括十五歲以上大人病則為勞十五歲以下小兒病則為疳緣所稟之氣血虛弱臟腑嬌嫩易於受傷或因乳食過飽傷其脾胃是病之原或因肥甘失節停滯中脘傳化遲滯腸胃漸傷則生積熱熱盛成疳則氣血消耗精液被其熬煎凡初患疳證尿如米泔午後潮熱即久失治致令青筋暴露壯大堅硬面色青黃肌肉消瘦皮毛憔悴眼睛發䀽則疳證成矣脾疳脾屬土色黃主肌肉故脾疳則見面黃肌肉消瘦身體發熱困倦常喜睡眠心下痞硬懶進乳食腹滿腫脹睡臥喜冷好食泥土腹痛堅硬頭大頸粗有時吐瀉口乾煩渴大便腥黏之證也宜先攻其積用消疳理脾湯肥兒丸治之積退然後補其脾氣以參苓白朮散為先疳瀉疳瀉之疾多因積熱傷脾因致水穀不分而作瀉也法當先用清熱滲濕後補其脾則為妙訣初宜清熱和中湯主之若久瀉不愈用參苓白朮散最捷疳腫脹疳疾腫脹面色浮光者多因傳化失宜以致脾肺兩傷現證氣逆喘咳胸膈痞悶肚腹腫脹也宜用御苑勻氣散服之最良疳痢疳疾日久頻頻下痢者多緣腸胃熱結凝滯所致故痢時或赤或白腹中窘痛急用香連導滯湯為妙劑也肝疳肝屬木色青主筋故肝疳則見面目爪甲皆青眼生眵淚隱澀難睜搖頭揉目合面睡臥耳流膿水而濕瘡生腹大青筋身體羸瘦燥渴煩急糞如苔青也治宜先清其熱用柴胡清肝散同蘆薈肥兒丸主之若病勢稍退則當調養用逍遙散抑肝扶脾湯最靈心疳心屬火色赤主血脈故心疳則見面紅脈絡赤壯熱有汗時時煩驚咬牙弄舌口舌乾燥渴飲口舌生瘡小便紅赤胸膈滿悶睡喜伏臥懶食乾瘦吐利頻頻也熱盛者瀉心導赤湯主之熱盛兼驚者用珍珠散治之病久心虛者茯神湯調理之始可收功也疳渴疳渴者多因肥甘積熱煎耗脾胃以致損傷津液故不時大渴引飲心神煩熱速用清熱甘露飲最宜則熱減津生其渴自歇肺疳肺屬金色白主皮毛故肺疳則見面白氣逆有時咳嗽毛髮焦枯皮上生粟肌膚乾燥發熱憎寒常流清涕鼻頰生瘡號曰肺疳也先當疏散用生地清肺飲繼則清熱以甘露飲為先日久肺虛者用補肺散最效隨證加減莫遲延也腎疳腎屬水色黑主骨患此疳者初必有解顱鶴膝齒遲行遲乃腎氣不足之證更因肥甘失節久則漸成腎疳故骨瘦如柴面色黑黧齒齦出血口中臭氣足冷如冰腹痛泄瀉哭啼不已乃腎疳也先用金蟬丸治其疳繼以九味地黃丸調補之相宜若逢稟賦腎氣虛弱用調元散進之莫遲延也疳熱小兒疳疾之證身多發熱治其輕重虛實當分別也若病初起多實者用青蒿鱉甲飲最宜日久多虛者鱉甲散最捷驗也腦疳腦疳者多緣小兒素受風熱又兼乳哺失於調節以致變生此證頭皮光急腦生餅瘡頭熱毛焦發如穗結鼻乾心煩腮囟腫硬困倦睛暗自汗肢體熱也腦熱生瘡者龍膽丸主之煩熱羸瘦者龍腦丸最良外用吹鼻龍腦散其效甚捷眼疳疳熱上攻於眼而成眼疳之證故發時癢澀赤爛眼胞腫疼白睛生翳漸漸遮滿不時流淚羞明目不睜開先要疏散用瀉肝散最妙再用消其翳以清熱退翳湯極靈目久不瘥法當調補逍遙散與羊肝散從治鼻疳疳熱上攻於肺而成鼻疳蓋鼻為肺竅故發時鼻塞赤癢疼痛難堪浸淫潰爛下連唇際成瘡咳嗽氣促毛髮乾枯也如熱盛者用清金散蔣氏化毒丹治之疳蟲蝕鼻者用化蟲丸其外調敷須用鼻疳散或以吹鼻蟬殼散吹入鼻中其效如神牙疳牙疳者因毒熱內攻於胃而成故毒熱上發齦血赤爛疼痛口鼻血出牙枯脫落穿腮蝕唇也此證命多傾敗治宜急消其毒用消疳蕪荑散最效繼以蘆薈肥兒丸清除其熱最靈外用牙疳散時時敷上自愈總之此證必胃強能食堪勝峻藥始能有生機也脊疳小兒積熱生蟲上蝕脊膂以手擊其背必空若鼓鳴脊骨羸瘦如鋸齒狀始為脊疳外證亦身體發熱下利煩渴加增十指皆瘡頻齧爪甲此名脊疳其病甚凶須先以蘆薈丸殺其蟲再合金蟬散消其疳則急急調治莫從容也蛔疳蛔疳者因過食油膩生冷並肥甘之物以致濕熱生蛔腹內纏擾故有時煩躁多啼有時肚腹攪痛口唇色變或紅或白口溢清涎腹脹青筋肛門濕癢也急用使君子散治之莫遲延也如不愈用下蟲丸極效若蛔退又當調補其脾以肥兒丸主之無辜疳無辜疳者其病原有二焉或因浣衣夜露被無辜鳥落羽所汙衣著兒身致成此證或緣乳母有病傳染小兒以有此疾其證頸項生瘡或項內有核如彈按之轉動軟而不疼其中有蟲如米粉不速破之使蟲蝕臟腑便利膿血身體羸瘦面黃發熱致疳病生也治宜先清其熱宜用柴胡飲再消其疳以蘆薈肥兒丸繼之其效如神丁奚疳遍身骨露其狀似丁故號丁奚也其證肌肉乾澀晝夜啼哭不止手足枯細面色黧黑項細腹大突出肚臍尻削身軟精神倦怠骨蒸潮熱燥渴煩急也先化其滯用五疳消積丸治之繼用理脾補養以人參啓脾丸最宜哺露疳哺露者因乳食有不節大傷脾胃也羸瘦如薪吐食吐蟲心煩口渴頭骨開張日脯熱蒸也先用集聖丸消其積滯繼用肥兒丸清理其脾極靈若哺露日久還腹大青筋現者又宜清補兼施以人參丸服之莫從容也嘔吐門總括蓋諸逆上衝皆成嘔吐夫諸逆之因或以乳食過多停滯中脘胃氣不能健運而上逆也或於食時觸驚停積不化而上逆也或因痰飲壅盛阻隔氣道或蛔蟲擾亂懊憹不安而上逆也總之上逆之因雖不同而皆能成嘔吐也但病有虛有實有寒有熱治者要分明也辨嘔吐噦證吐證有三古人謂有物有聲謂之嘔屬陽明氣血俱病也有物無聲吐證之名屬太陽血病也無物有聲為噦證屬少陽氣病也獨李杲謂嘔吐噦俱屬脾胃虛弱潔古老人又從三焦以分氣積寒之三因然皆不外諸逆上衝也治者能分虛實別寒熱醫治之自無不曲中病情矣傷乳吐小兒乳食過飽停蓄胃中以致運化不極吐多片乳猶如物盛滿而上溢也其證身熱面黃肚腹膨脹治宜消乳丸保和丸化其宿食安胃和中兼節其乳食自然吐止也傷食吐小兒飲食無節過食油膩麵食等物以致壅塞中脘損傷胃氣而成其證肚腹脹熱惡食口臭頻吐酸黏眼胞虛浮身體潮熱治宜清胃和中為主須先服三稜丸止其吐再用和胃湯煎服化其滯而病愈矣夾驚吐小兒多因飲食之時忽被驚邪所觸而成吐其證頻吐清涎身體發熱心神煩躁睡臥不安宜先截其風用全蠍觀音散極妙次止其吐用定吐丸而病可痊矣痰飲吐小兒飲水過多以致痰飲壅盛留在胸中變而為痰痰因氣逆嘔吐成矣其候頭目眩暈面青嘔吐涎水痰沫宜用香砂二陳湯虛者用香砂六君子湯治之可安寧矣蟲吐蟲吐之證有二有以胃經熱蒸而成有以胃經寒迫者皆能令蟲不安擾亂胃中而作吐也其證唇色必變青色或紅或白胃口時疼時止頻嘔青涎屬寒屬熱當以陰陽之證辨之熱者化蟲丸主之寒者加減理中湯主之定可痊也虛吐虛吐之證多因胃氣虛弱不能消納乳食致成此證也其精神倦怠囟門煽動睡臥露睛自利不渴頻頻嘔吐以丁香沉香加四君子湯治之最靈也實吐小兒平素壯實偶而停滯胸腹脹滿二便祕澀不利痞硬疼痛口中發渴思飲寒涼吐多酸臭宜用三一承氣湯下之二便利而吐止可收功矣寒吐此因小兒過食生冷或乳母當風取涼使寒氣入乳小兒飲之則成冷吐其候朝食而暮吐乳食不化吐出之物不臭不酸四肢厥冷面唇色白治當溫中定吐胃微寒者姜橘散主之寒甚者丁萸理中湯煎服熱吐小兒過食煎爆之物或乳母過厚味以致熱積胃中遂成熱吐其候食入而即吐口渴飲冷嘔吐酸涎身熱唇紅小便赤色治宜清熱為主用加味溫膽湯可痊也瀉證門總括小兒泄瀉一證多因脾被濕侵土不勝水而成然致病之原各異醫者認之須清或傷乳停食不化或感受寒冷暑熱之氣或驚邪外觸或臟受寒冷或脾虛作瀉更有飧瀉水瀉之證致疾之因不同而調治之法亦異或分消或溫補治宜精細辨之傷乳食瀉小兒因乳食過飽損傷脾胃乳食不化故頻瀉酸脹噫臭腹熱脹滿疼痛口渴惡食小便赤澀須用保安丸消其滯次用平胃散和其脾庶積消而瀉止奏神功矣中寒瀉小兒中寒瀉者因過食生冷油膩腸鳴腹脹時復疼痛所泄皆澄徹清冷面色淡白四肢逆冷懶進飲食溫中理中湯主之止瀉訶子散堪行也火瀉火瀉者皆因臟腑積熱或外傷暑氣故瀉時暴注下迫肚腹疼痛心煩口渴瀉多黃水小便赤色先用玉露散清其熱再用四苓散利其水庶可收功矣驚瀉驚瀉者因氣弱受驚致成泄瀉其候夜臥不安晝則惕驚糞稠若膠並帶青色如苔也治宜鎮心抑肝先以鎮驚散定其驚次以養脾丸服之理其脾則通靈可望也臟寒瀉小兒斷臍失護風冷乘入傳於大腸遂成寒瀉之證其候糞色清白腹痛腸鳴先散其寒用和氣飲極效後用溫補以調中湯再靈也脾虛瀉脾虛瀉者多因脾不健運故每逢食後即作瀉腹滿不渴短少精神面黃懶食肌肉消瘦也宜用參苓白朮散治之必奏奇效也飧瀉小兒或因春傷風邪清氣下陷脾失健運以致完穀不化者乃飧瀉之名也治者須補養脾土先用補中益氣湯升其中氣若泄瀉日久腸滑不禁者用四神丸治之水瀉小兒脾胃濕盛致成水瀉懶食溏瀉便色多黃清濁不分溺來短澀宜用胃苓湯以除濕若瀉久不止則用升陽除濕湯治之自愈感冒風寒門總括小兒氣血未充肌膚最是柔脆偶觸風寒則邪氣入於腠理其病在榮衛輕者為感冒而病易痊重者為傷寒而證難退或有夾食夾熱或夾驚之辨或宜疏散或宜和解臨證之時宜體會焉傷風衛主皮毛內合於肺肺感受邪風故令身體發熱憎寒頭疼痛有汗嚏涕其脈浮緩鼻塞身重咳嗽頻頻宜杏蘇飲解散外邪同金沸草散開通逆氣此疏風解表若從容也傷寒小兒傷寒乃榮分表感寒邪也其證發熱無汗而惡寒頭疼身痛其脈浮緊嘔逆煩渴此病邪盛欲傳經也初用九味羌活湯如熱盛者以雙解通聖湯治之服此藥後已汗下不解而邪傳經者用柴葛解肌湯兼里證者用大柴胡湯以解表通里煎服感冒夾食小兒平日飲食不節內傷停滯外復感受寒風其證發熱憎寒頭痛疼惡食噯臭吐出酸物便閉尿澀腹熱膨脹熱盛者用雙解通聖湯兩解之內無熱者用藿香正氣飲和解之表邪已解然後調理其脾用平胃散斟酌而行感冒夾熱小兒臟腑平日素稟有熱今復感傷風寒風熱相搏則火邪愈盛故見證面赤唇焦口鼻乾燥憎寒壯熱口渴飲冷心神煩躁譫語狂妄二便多艱治宜散其風寒更宜兼瀉其熱先宜用雙解通聖湯兩解之若服藥後汗出便利病須少減熱猶不退者治宜清熱為主用涼膈散合天水散煎服則表裡清而病愈矣感冒夾驚小兒感冒風邪未解復為驚異所觸故見心驚膽怯睡臥不安身熱煩躁面色青赤之證先以疏解散疏散之復與涼驚丸清鎮之如病雖退尚覺心驚不寐者再以柴胡溫膽湯之劑和解之則寧神定志其效如仙矣瘟疫門總括瘟疫之病與傷寒之病傳變相同有冬感於寒而即病者乃傷寒之名有冬受寒邪而未即發藏於肌膚之內伏於榮衛之間因至春復感春風而發溫病成焉至夏復感暑熱發為熱病若合門逐戶老幼相傳乃天行瘟疫其害更烈或春夏應暖而反寒秋冬應寒而反暖此為四時不正之氣名為時氣相感為病與傷寒同治也其間或發痧發疹發瘟癍要當詳明治之溫病冬受寒邪不即為病至春復感春寒而發名為溫病現證同於傷寒用雙解通聖湯兩解之若嘔吐者加生薑半夏均入風溫風溫者冬受寒邪復感春風而發為病其證發熱自汗身重鼾眠如汗少者用荊防敗毒散治之汗多者以桂枝白虎湯煎服清解之熱病冬受寒邪不即為病至夏復感暑熱而成熱病見證與溫病相類但身不惡寒而口多渴為少異耳治法亦與溫病相同也瘟疫天地流行厲氣而成瘟疫之病不論老小強弱沿門合境皆同蓋由邪氣自口鼻而入故此傳染之速迅如風火當分有在表在裡在陰在陽之毒其或發或清或攻當因春風夏熱秋涼冬寒之四時各異審人虛實重輕以施治也古法皆以攻毒為急者以邪自口鼻入在裡之病多故也發以荊防敗毒散清以普濟消毒飲再攻以二聖救苦丹則審度醫治庶幾臨證有功矣瘟癍疹痧傷寒發疹發癍發痧皆因失於汗下乃時氣感染即其然也緣表邪覆郁榮衛之分外泛出皮脈而成痧疹癍之證亦由疫之為病烈而速也發於衛分則為痧衛主氣故色白發於榮分則為疹營主血故色紅皆如膚粟深重為癍癍紅如豆甚則成片連連癍疹之色紅者輕赤者重黑多死證以色辨熱之淺深驗生死也若其色淡紅稀暗者皆邪在三陽已成癍疹由外入里邪從陰化或過服寒涼之藥所致是為陰癍陰痧陰疹法當從陰寒治也癍出未透表熱輕者用升麻葛根湯合消毒犀角飲治之表熱盛者用三黃石膏湯煎服已透者用消癍青黛飲加減清之瘀疹初起或表裡不清用雙解通聖湯為先暑證門總括小兒暑病有四證焉中暑為陽邪單中暑熱也身熱有汗傷暑為陰邪中暑復感寒也身熱無汗中暑熱極攻肝則抽搐如攻心則厥冒不知人事也中暑中暑之證汗出身體壯熱因暑熱熏蒸故頭痛口大渴煩躁不寧甚則氣乏神倦兩足寒冷須以加味人參白虎湯極靈傷暑小兒傷暑謂受暑復感寒風也其證無汗發熱口渴面色赤紅乾嘔惡中腹中絞痛嗜臥懶食四肢重疼也當用內清外散之法以二香飲極效若正氣虛弱當補正除邪以六君子湯奏功若傷暑夾食必惡食多吐瀉以加味香薷飲治之最靈也暑風暑風者手足抽搐狀似驚風者也由暑熱攻肝內傷風病其證煩渴有汗身熱二便黃紅先用加味香薷飲疏其風繼用玉露散清其熱暑熱一解而搐自寧矣切不可作驚癇治之暑厥暑厥之證昏眩不知人事者因其人元氣素虛暑熱夾痰上衝於心以致精神昏憒虛者以清暑益氣湯治之若夾痰者以辰砂益元散抱龍丸均可治也霍亂門總括霍亂者乃風寒暑飲之雜邪為病而成卒然揮霍變亂吐瀉交作腹心疼痛也其能吐能瀉者乃飲暑盛謂之濕霍亂夫飲暑雖盛若已經吐瀉其邪即解故易治也若欲吐不能欲瀉不能乃寒勝則凝也為乾霍亂蓋既不吐瀉則邪無去路故症不輕也濕霍亂如暑飲合邪其證吐瀉不已肚腹頻痛口渴引飲胸膈悶膨飲盛者主以二香飲治之暑盛者以辰砂益元散治之則暑飲之邪清而霍亂之證愈其功最靈也乾霍亂如欲吐不吐欲瀉不瀉乃寒暑凝結腹中絞痛不能堪當俗名絞腸痧病也治者當分寒暑如煩渴大飲者為熱以桂苓甘露飲主之若四肢厥逆口不渴理中湯煎服痢疾門總括痢疾之證多因外受暑濕內傷生冷而成傷於氣者色多白以肺與大腸相表裡也傷於血者色多紅以心與小腸相表裡也其證後重下墜裡急而腹窘痛又有寒痢熱痢時痢噤口痢之名醫者辨之寒痢寒冷傷胃久痢不已或臟氣本虛復為風寒所乘傷於腸胃故痢時腸鳴切痛實難堪當面唇青白口呈渴而喜飲熱此裡寒虛之證也初宜理中湯久則真人養臟湯主之其效通仙也熱痢熱痢者皆因濕熱結於腸胃致腹窘痛下痢無度尿短色紅舌赤唇焦喜飲冷水此裡熱之證也重則當歸芍藥湯主之輕則白頭翁湯主之或香連丸治之亦靈時痢時痢者乃痢疾時復感時氣也身體發熱無汗遍身疼痛熱為邪束因作嘔逆須以倉凜湯散之而痢自止有奇功也噤口痢如火毒沖冒而成噤口其證脈大身熱不能飲食舌赤唇紅惟喜飲冷急宜參連開噤散救之其功奇矣瘧疾門總括瘧疾者多因夏傷於暑其氣含入於榮內至秋復感寒風則榮衛合邪而病始成發時陰陽相併故或寒或熱也乃有每日作者因初病邪氣尚淺伏藏於榮隨經絡而行故也其間日作者因邪已深入脊膂間伏藏於衝脈故也其晝發者因邪在三陽之淺夜發者因邪在三陰之深瘧將退者亦由夜而晝由間日而至每日此去陰就陽由深而淺病將已矣治者須詳細分明別之也寒瘧風瘧凡瘧疾先傷於寒後傷於風故先寒後熱身體無汗此為寒瘧不須細詳如先傷於風後傷於寒故先熱後寒身體有汗此為風瘧亦已詳明如寒瘧以麻黃羌活湯之劑為主如風瘧惟桂枝羌活湯斟酌用之食瘧食瘧者因小兒飲食無節復感風暑之氣以致寒熱交作胸腹脹滿面黃惡食痞悶不通也但食有輕重輕者須用柴平湯之劑主之如重而便鞕者用加味大柴胡湯攻之則積滯清而瘧漸退矣瘧痰瘧飲小兒素有痰飲復因外邪凝結脾胃故多嘔逆面黃目腫胸膈膨脹也若瘧疾已經汗下之後表裡無證宜用清脾飲以和之如痰盛者用清脾飲加橘紅倍半夏飲盛者加蒼朮倍茯苓若氣已虛弱加人參以扶其正咳嗽門總括病機式要云肺病則咳嗽謂有痰有聲因肺氣受傷動乎脾濕而然也若只有聲而無痰是咳之名肺氣傷而不清也有痰而無聲謂之嗽脾濕動而為痰也二者雖俱屬肺之為病然又有肺寒肺熱之分食積風寒之別醫者宜詳辨之肺寒咳嗽寒嗽者因平素肺虛喜飲生冷以致寒邪傷肺發為咳嗽其證面色㿠白痰多鼻涕清稀初宜聖惠橘皮散為主之藥若日久而嗽不愈者須用補肺阿膠散治之則順氣化痰而嗽寧矣肺熱咳嗽火嗽一證乃火熱熏擾肺金遂致頻頻咳嗽面赤咽喉乾燥痰黃氣穢多帶稠黏也便軟者加味瀉白散主之便硬加味涼膈散煎服則熱退氣清而嗽自止矣食積咳嗽食積者因小兒食積生痰熱氣熏蒸肺氣氣促痰壅咳嗽頻頻也如便溏者以曲麥二陳湯治之便燥者以蘇亭滾痰丸攻下之風寒咳嗽小兒脫衣偶為風寒所乘肺先受邪使氣上逆沖塞咽喉發為咳嗽如常嚏噴流涕鼻塞聲重多唾痰涎先宣疏解風邪以參蘇飲主之後清其痰嗽用金沸湯主之若寒邪壅當散其寒以加味華蓋散治之則風邪解而氣道通氣道通而咳嗽痊矣喘證門總括喘證者則呼吸氣出急促外候抬肩缺肚也哮則喉中有聲音也然致病之原不一如實熱者則有氣粗胸滿痰稠便鞕而喘如虛寒者則有氣乏息微不能續息而喘其中有風寒壅閉而喘又有痰飲壅逆而喘更有馬脾風一證最為急候醫者須分別詳明而治之火熱喘急火邪刑金作喘者多口乾舌燥作渴面赤唇紅也因於肺熱者以涼膈散主之因於胃熱者以白虎湯清之心火刑金者宜用導赤散主之腎虛火來爍金者宜用知柏地黃湯治之最靈也肺虛作喘虛喘之證氣乏聲音短澀以潔古黃耆湯治之最捷若虛而夾痰喘促者百合固金湯治之若虛而夾熱者以本事黃耆湯之劑煎服風寒喘急肺主皮毛一受風寒內傷肺氣則氣逆不降呼吸喘急表熱無汗宜以華蓋散之方汗而散之若肺氣本虛覆被風邪所傷者宜紫蘇飲補而散之若肺虛外無風邪所傷內無痰涎壅塞惟氣逆喘急者以加減蘇子降氣湯降其逆氣其喘自愈痰飲喘急小兒痰飲壅盛氣逆因作喘者其音如潮響聲如拽鋸須急攻痰飲宜蘇葶滾痰丸從而治之若停飲喘急不得臥者又當瀉飲降逆用蘇葶丸治之馬脾風小兒暴喘俗傳其名馬脾風因寒邪客於肺俞寒化為熱閉於肺經故胸高氣促肺脹喘滿兩脅扇動陷下作坑鼻竅扇動神氣悶亂初遇之急服五虎湯繼用一捻金下之倘得氣開其效最靈如兒生百日內見此者病多不救痰證門總括痰者因水穀所化之津液不能四布留於胸中而成者也多因飲食無節或乳食過食厚味脾胃不能運化而生若陰氣素盛則化而為飲陽氣素盛則化而為痰如稠黏黃色澀滯難出為之燥痰清稀色白滑而易出乃濕寒也二者或宜清潤或宜通利治各不同燥痰燥痰者乃肺燥滯澀難出痰因火動也火盛則痰多燥黏故氣逆喘咳夜臥不寧面紅口乾小便黃赤輕者用清氣化痰丸清之重者用蘇葶滾痰丸平之濕痰濕痰者因小兒過食生冷油膩之物有傷脾胃遂致脾土虛濕不能運化而成濕痰滑而易出脾虛不運故懶飲食脾主四肢故倦怠嗜臥脾屬土故面色多黃如痰多者用枳桔二陳之劑加蒼朮白朮除濕化痰飲盛者用桂苓甘術湯扶陽散飲調治合宜而痰自化矣疝證門總括厥陰之脈環陰器入小腹任脈起於中極之下以上毛際循腹裡上關元故諸疝莫不屬之厥陰任脈為病也小兒病此多因先天不足本臟虛弱復因外感風寒內食生冷以致寒邪積聚凝結而成者有之或因濕熱鬱於中復為寒邪束於外邪氣乘虛並於血隊流入厥陰厥陰屬肝其性急速故其見證皆牽引睪丸小腹絞痛也又有胎疝一證多因孕婦啼泣過傷動於陰氣結聚不散令兒生下即成此證者乃稟賦為病也總審大抵熱則多縱寒則痛臨血分者在左不移氣分者在右多動濕腫墜則重虛腫墜則輕也因證而治自中病情矣寒疝小兒平日過食生冷或臥濕地以致寒濕內蓄陰結於內氣滯不行為日已久深復為風冷所束水氣所侵故發時囊冷結硬牽引小腹作痛而成寒疝初得之兼表者以烏頭桂枝湯主之寒甚者金茱丸治之如神也濕熱感寒疝小兒平素厚味過度致生濕熱濕熱之氣下行流入囊中復觸風寒而疝氣成矣發時囊縱紅腫常常刺痛當以烏頭梔子湯服之即寧也胎疝胎疝者多因孕婦啼哭過傷氣結不散蘊於胞中令兒生下胞硬疼痛無時輕者用十味蒼柏散治之重者用金鈴散或川楝丸最宜陰腫陰器者乃諸筋之總會也因邪客於少陰厥陰之經濕熱之氣與風冷之氣相搏氣不得通故陰囊腫大者乃邪氣凝結也總之風盛多癢濕盛多墜熱盛多疼如外腎膚囊腫大癢痛墜下此風濕襲於下也宜疏風五苓散主之如外腎膚囊腫痛光亮此因心火移熱於小腸故也宜用加味五苓散或導赤散主之更有偏墜一證或左或右睪丸作腫者此因食積不化濕氣下行故也宜加味守效丸服之最靈小腸氣小腸氣一證其受病與疝氣等亦因濕氣在內而寒氣又束於外也發時小腹脹控睪丸痛引腰脊上衝心痛而不腫是也治宜分別形狀如引腰而痛者宜加味香蘇散溫散之為宜如上衝心氣而痛者加味失笑散主之如小腹中有形如卵上下往來痛不可忍者宜胡蘆巴丸醫之淋證門總括小兒諸淋皆緣風寒襲人或因濕熱下移乘入膀胱以致溲溺無時水道澀滯欲出不出淋漓不斷甚至窒塞令兒常常作痛然必辨其為寒為熱為石為血隨證分別醫治則水道宣通而淋自愈矣寒淋小兒冷氣乘入胞中致下焦受冷遂成寒淋其候小便閉塞脹痛難禁淋漓不斷小腹隱痛須以五苓散倍加肉桂小茴香治之如神也熱淋膀胱蓄熱熱淋成矣小便不通淋漓澀痛以十味導赤散治之有奇功也如小腹脹滿引臍作痛大便閉結者急服八正散莫少停也石淋膀胱濕熱蓄積日久而成石淋之證致溲出如沙石之狀莖中疼痛此病譬如湯瓶久經火煉底結白磏也如輕者須用葵子散主之重則用八正散可相從也血淋血淋者蓋因心熱傷於血分熱氣傳入於胞日久則尿血同出莖中不時疼痛痛利者須用小薊飲主之若莖中痛甚者五淋散從而用之頭痛門總括小兒頭痛之證不一當分在表在裡之別如在裡者屬內熱熏蒸也在表者外感寒風也如風寒外閉法宜疏散之內熱熏蒸以清解攻之風寒頭痛風寒頭痛者乃屬太陽經受邪也其候上及巔頂下連額角之傍不時作痛惡寒無汗身體發熱法宜取汗悉以清空膏主之如痛甚者於本方中加細辛熱盛便祕者於本方中加大黃內熱頭痛內熱頭痛者屬陽明胃經因小兒肥甘無節胃火上炎故發時鼻乾目痛上至頭下至齒頰疼痛無有定時先清其火用加味茶調散主之如便閉加入大黃攻之腹痛門總括小兒腹痛有四證焉如食痛寒痛蟲痛等因又有停食感寒相兼而痛也須隨證施治寒則溫中食則消導蟲則安蟲停食感寒則消散宜詳辨分明其痛自除矣食痛食痛者皆因傷於飲食積滯不化以致心胃作痛其候食入即痛喜飲涼水惡食腹滿吐酸便祕先以小承氣湯下之若下後仍痛者以香砂平胃散酌量嘗之寒痛寒痛者多因小兒中氣虛弱復為風冷所乘則脾經受寒故不時腹痛現證尿白爪甲俱白面色青喜飲熱腹滿或下利宜理中湯溫之若四肢厥冷兼屬少陰加附子煎服蟲痛蟲痛者因腹中蟲動不安故腹因作痛其候面色乍青乍赤乍白其痛時痛時止時吐清涎不可妄用攻下當以安蟲為主其痛自止新痛者錢氏安蟲丸主之痛久不愈者加減理中湯治之最合內食外寒腹痛小兒內傷乳食外感寒邪遂致食寒凝結腹中作痛其候發熱惡寒腹痛更兼惡食嘔吐而多啼叫不已者以藿香和中湯可急煎服黃疸門總括黃疽一證乃濕熱鬱蒸日久外發肌膚而成也其候遍身皆黃及面目眼睛亦甚深黃面如煙燻之狀其中又有陰陽之別如陽黃尿赤色亮面紅口渴身多發熱是也乃脾家濕熱之故如陰黃口不渴而色暗黃身冷如冰是也乃脾腎寒濕之故醫者宜分別施治陽黃陽黃一證原因濕熱而成如表實無汗宜疏散其汗用茵陳麻黃湯散發汗也則黃從表解如裡實腹滿二便祕澀者宜茵陳蒿湯攻下之若表有汗里不便祕腹滿是表裡無證不可汗下惟利小便宜用茵陳五苓散治之使黃從水道出其方最驗陰黃陰黃之證最為危險乃脾濕腎寒兩虛而成宜溫脾去黃以茵陳理中湯治之如溫腎去黃以茵陳四逆湯治之最靈水腫門總括小兒水腫俱屬水停於脾肺二經如水停肺中則喘水停脾中則脹其間所腫部位要分明也若腰以上腫者屬風宜汗散之腰以下腫者屬濕利水之法最靈有通身上下俱腫者治宜利汗並施腫而喘不得臥則逐肺飲腫而脹滿便閉則宜攻脾水腫從腹起至四肢者可治從四肢起至腹者不可治當再辨有陽水與陰水之分陽水屬實法宜攻瀉陰水屬虛法宜溫補臨證之時貴變通焉風水腫凡腫在腰以上如頭面肩臂至腰腫者病因外感風邪而起急宜發汗莫從容也經云開鬼門之法以越婢湯中加蒼朮汗之汗後全消病即寧矣濕水腫腫在腰臍之下兩足者病因脾經濕熱而起急宜利水可安然也經云潔淨府是也先用外法以藥貼臍如神之妙內服沉香琥珀丸風濕腫通身頭面手足皆腫者得病之由乃屬外感風邪內停濕飲風濕相搏水道不利外攻肌表因而作腫也治法用外散內利則最相宜重者用峻攻之則用疏鑿飲輕者和解之劑用茯苓導水湯醫之若水停上攻於肺喘急不得臥用蘇葶丸以定其喘亦最相宜水停中州脹滿喘急者用舟車神祐丸最攻之也陽水陽水者乃濕熱內郁水道阻塞外攻肌表以致外腫內脹身熱口渴六脈沉數小便赤澀大便多難也法當泄水如熱盛心煩口渴者用大聖濬川散攻之濕盛脹滿者用舟車神祐丸攻之陰水陰水者乃脾腎虛弱脾虛不能制水腎虛不能生水以致外泛作腫內停作脹若二便利心不煩身不熱者須服實脾散金匱腎氣丸若服溫補藥而無效驗則是虛中有實欲投攻下恐小兒難堪若不攻之則坐以待斃雖攻補兼施或一補一攻或三補一攻或九補一攻審其進退俟有可攻之機以意消息始能逐邪而不傷正病可痊也必忌鹽醬百日腹脹門總括腹脹之病脾胃二經主之有虛有實宜分晰焉若脾虛因久病內傷其脾胃實者多由飲食滯停於胃如補虛則宜健脾而兼理氣攻食則宜消導自然寧矣虛脹凡小兒久病脾虛失其健運或因吐瀉暴傷脾氣所以飲食不化食少腹即脹滿精神倦怠面黃肌瘦宜用香朴四君子湯醫之實脹小兒飲食過度內傷胃氣則胃中停滯以致腹脹大便不通身體潮熱心煩口渴形氣壯實輕者加味平胃散主之重者小承氣湯施治再靈也發熱門總括小兒身體發熱有表裡虛實之異治亦有汗下補瀉之殊宜分別焉須當觀形察色辨其因由審證切脈臨證無遺缺也表熱小兒表熱之證因外感寒邪脈浮發熱惡風惡寒頭疼身痛而無汗出此表熱也宜十神湯主之兼內熱者用雙解通聖散為先裡熱小兒裡熱之證因肥甘過度必生內熱以致遍身蒸蒸發熱小便澀紅面赤唇焦舌燥而渴脈實有力者失以調胃承氣湯下之不愈用白虎湯或黃連解毒湯清之虛熱虛熱者因小兒病後營衛虛弱氣血未調之故其證神倦氣乏宜用補中益氣湯治之若口渴引飲而嘔用竹葉石膏湯治之又有陰盛格陽外浮發熱者其面色雖赤而尿清白四肢厥冷宜用白通湯收斂陽氣熱退自愈實熱小兒實熱者乃有餘積熱以致午後潮熱蒸蒸有汗肚腹脹滿尿紅大便難煩渴啼叫口舌生瘡腮頰紅赤脈洪數有力法宜清熱通利時時熱者用涼膈散主之午後潮熱者大柴胡湯主之其效通仙也癖疾門總括癖疾一證乃過於飲食腸胃填滿濁汁外溢覆被寒氣凝結而成每在左脅之下始如雞卵漸如覆盆之形越臍則難治身體潮熱喜飲冷水肌膚消瘦腹滿有硬塊面色黃青也治者宜詳察之證治癖疾之發必午後潮熱渴飲冷水肚大青筋漸至堅硬成塊不時疼痛內服千金消癖丸若無熱渴者先以木香丸治之外俱貼紅花膏則內外兼治效最靈也汗證門總括汗乃人之津液存於陽者為津存於陰者為液泄於外者為汗若汗無故而出者乃陰陽偏勝也如小兒無因而汗自出者謂之自汗自汗屬陽有虛實之別有因胃熱者汗出蒸蒸發熱不惡寒也有表虛者汗出翕翕發熱惡寒也又有睡中出汗覺則汗止為之盜汗盜汗為之陰弱然當分心虛不固心火傷陰有血熱不清治者必須表虛者當固表裡實者當攻熱心虛當補心心熱當涼血隨證醫之庶無差謬自汗虛濈表濈自汗玉屏風散主之若惡寒冷用桂枝湯加附子陽明裡實蒸蒸自汗用白虎湯清之便祕用調胃承氣湯攻之盜汗心虛盜汗者陰氣不斂也睡則多驚以酸棗仁湯服之即寧如心火傷陰身必煩熱以當歸六黃湯必定奏功失血門總括凡失血之證陽盛乘陰則血為熱迫不能安於脈中犯於氣分妄行不能歸入經脈也若傷及腑者則血滲入腸胃之濁道傷及於臟者則溢出於胸中之清道熱犯陽絡腑病也上行於咽出而為吐為衄熱侵陰絡臟病也則下從精竅而出為溺血下從大便而出為紅又有努傷勞傷而成血病若日久血上仍嗽不休者勢多凶危也衄血衄血之候鼻中乾燥身熱不渴而苦頭疼是熱傷陽絡也有因傷寒失表者當分有汗無汗之別如熱鬱於營其身無汗用麻黃湯汗之身有汗者用桂枝湯治之設無表病因內熱而衄者用犀角地黃湯清之熱盛者四物三黃瀉心湯瀉之外用發灰散或梔子末吹鼻其衄自止吐血小兒吐血不咳嗽者多因內熱致血妄行上逆也宜用犀角地黃湯如因努力勞傷而吐則兼咳嗽先用桃仁承氣湯破之次用加味四物湯嘗之又勞傷吐血亦兼咳嗽痰中帶血有熱者用雞蘇散止之無熱者須用加味救肺散為良便血小兒恣食肥甘致生內熱傷及陰絡病即便血一成臟毒先血後糞其血黯而濁如成腸風先糞後血其色鮮而紅須辨腸風腹中不痛臟毒肛門腫痛又熱盛濕盛亦要分明如臟毒初起腫痛甚者初宜皂刺大黃湯消之即寧熱盛微痛者及臟毒俱宜槐花散主之濕盛不痛者用平胃地榆湯再靈便血日久脈微氣血弱者用升陽和血湯和之共人參養榮湯補之溺血溺血多緣精竅病乃尿與血先後分出莖中或痛用牛膝四物湯調治急宜煎服效從容也雜證門二便祕結小兒多因乳食停滯生熱結於腸胃以致二便祕結其候口渴舌乾唇赤面紅熱積尿閉小腹滿急八正散主之食積大便閉腹脹痛者用神芎丸主之氣虛脫肛脫肛一症因瀉痢日久中氣下陷腸胃薄瘦肛門滑脫不收現證面色青黃指梢冷脈來沉細唇色淡白先以補中益氣湯升舉其氣再以真人養臟湯溫補固滑外用澀腸散敷上其腸自合矣肛腫翻肛小兒積熱太盛以致肛門作腫大便艱難努力翻出肛門不還外用蟠龍散敷上以消其腫內宜皂刺大黃湯煎服腫消肛自收也龜胸小兒飲食不節痰熱熾盛復為風邪所傷風熱相搏以致肺經脹滿攻於胸膈高聳如